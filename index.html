<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <title>料理のゴール設計シート</title>

  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">
  <div id="root"></div>

  <script type="text/babel">
    const { useState } = React;

    function App() {
      const [name, setName] = useState("");
      const [dish, setDish] = useState("");
      const [goal, setGoal] = useState("");
      const [richness, setRichness] = useState("");
      const [contrast, setContrast] = useState("");

      return (
        <div className="max-w-xl mx-auto p-6 bg-white rounded-2xl shadow mt-10">
          <h1 className="text-2xl font-bold mb-6">
            料理のゴール設計シート 入力フォーム
          </h1>

          <div className="mb-4">
            <label className="block mb-1 font-semibold">お名前</label>
            <input
              className="border p-2 w-full rounded"
              value={name}
              onChange={(e) => setName(e.target.value)}
              placeholder="例：料理 花子"
            />
          </div>

          <div className="mb-4">
            <label className="block mb-1 font-semibold">料理名</label>
            <input
              className="border p-2 w-full rounded"
              value={dish}
              onChange={(e) => setDish(e.target.value)}
              placeholder="例：からあげ定食"
            />
          </div>

          <div className="mb-4">
            <label className="block mb-1 font-semibold">ゴール（らしさ）</label>
            <textarea
              className="border p-2 w-full rounded"
              value={goal}
              onChange={(e) => setGoal(e.target.value)}
              placeholder="どんな料理にしたいか"
            />
          </div>

          <div className="mb-4">
            <label className="block mb-1 font-semibold">コク</label>
            <textarea
              className="border p-2 w-full rounded"
              value={richness}
              onChange={(e) => setRichness(e.target.value)}
              placeholder="味の深みや強さ"
            />
          </div>

          <div className="mb-4">
            <label className="block mb-1 font-semibold">コントラスト</label>
            <textarea
              className="border p-2 w-full rounded"
              value={contrast}
              onChange={(e) => setContrast(e.target.value)}
              placeholder="味や食感の変化"
            />
          </div>

          <div className="mt-6 p-4 bg-gray-50 rounded">
            <p className="font-semibold mb-2">入力内容：</p>
            <p>名前：{name}</p>
            <p>料理：{dish}</p>
            <p>らしさ：{goal}</p>
            <p>コク：{richness}</p>
            <p>コントラスト：{contrast}</p>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("root")).render(<App />);
  </script>
</body>
</html>
