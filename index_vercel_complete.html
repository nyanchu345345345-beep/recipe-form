const sanitizeFileName = (name) => {
  return String(name || '')
    .replace(/[\\/:*?"<>|]/g, '＿')
    .replace(/\s+/g, ' ')
    .trim();
};

const isMobileDevice = () => {
  return /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
};

const savePdfWithPicker = async (pdf, filename, onMobilePdfReady) => {
  const blob = pdf.output('blob');

  // スマホの場合：Blobとfilenameをstateに渡す（Web Share API用）
  if (isMobileDevice()) {
    if (onMobilePdfReady) {
      onMobilePdfReady({
        filename,
        blob,
      });
    }
    return;
  }

  // PCの場合：保存先選択（showSaveFilePicker）が使えるなら優先
  if (window.showSaveFilePicker) {
    try {
      const handle = await window.showSaveFilePicker({
        suggestedName: filename,
        types: [{
          description: 'PDF file',
          accept: { 'application/pdf': ['.pdf'] },
        }],
      });
      const writable = await handle.createWritable();
      await writable.write(blob);
      await writable.close();
      return;
    } catch (e) {
      if (e && e.name === 'AbortError') return;
      console.warn('showSaveFilePicker failed, fallback to link download', e);
    }
  }

  // PCフォールバック：アンカータグによるダウンロード
  const blobUrl = URL.createObjectURL(blob);
  const link = document.createElement('a');
  link.href = blobUrl;
  link.download = filename;
  document.body.appendChild(link);
  link.click();
  document.body.removeChild(link);
  setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
};

};

const App = () => {
  const [showPreview, setShowPreview] = useState(false);

  const [user, setUser] = useState(null);

  const [draftData, setDraftData] = useState(null);

    sec4_2_umami: 0, sec4_2_shio: 0, sec4_2_fumi: 0, sec4_2_ama: 0, sec4_2_abura: 0,
    sec4_2_balance: '',
    sec4_3_tex_before: '', sec4_3_tex_chew: '', sec4_3_tex_after: '',
    sec4_3_fla_before: '', sec4_3_fla_chew: '', sec4_3_fla_after: '',
    sec4_3_tex_main_name: '', sec4_3_tex_main_image: '',
    sec4_3_tex_bridge_name: '', sec4_3_tex_bridge_image: '',
    sec4_3_tex_contrast_name: '', sec4_3_tex_contrast_image: '',
    sec4_3_tex_supplement: 'いいえ', sec4_3_tex_supplement_text: '',
    sec4_3_fla_main_name: '', sec4_3_fla_main_image: '',
    sec4_3_fla_bridge_name: '', sec4_3_fla_bridge_image: '',
    sec4_3_fla_contrast_name: '', sec4_3_fla_contrast_image: '',
    sec4_3_fla_supplement: 'いいえ', sec4_3_fla_supplement_text: '',
    sec4_4_taste_main_balance: '',
    sec4_4_taste_contrast_parts: '',
    sec4_4_sour: 0, sec4_4_spicy: 0, sec4_4_sweet: 0, sec4_4_fat: 0,
    sec4_4_bitter: 0, sec4_4_astringent: 0, sec4_4_umami: 0, sec4_4_shio: 0,
    sec5_evaluation: '', sec5_one_sentence: '', sec5_ingredient: '', sec5_cooking: '',
  });

  // --- Auth & Draft ---
  useEffect(() => {
    fetch('https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&display=swap')
      .then(res => res.text())
      .then(css => {
        const style = document.createElement('style');
        style.id = 'zen-maru-font';
        style.textContent = css;
        document.head.appendChild(style);
      });

    if (!auth) return;
    const initAuth = async () => {
      try {
        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
          await signInWithCustomToken(auth, __initial_auth_token);
        } else { await signInAnonymously(auth); }
      } catch (e) { console.error('Auth error', e); }
    };
    initAuth();
    const unsubscribe = onAuthStateChanged(auth, setUser);
    return () => unsubscribe();
  }, []);

  useEffect(() => {
    if (!user || !db) return;
    const checkDraft = async () => {
      try {
        const draftRef = doc(db, 'artifacts', appId, 'users', user.uid, 'drafts', 'currentDraft');
        const draftSnap = await getDoc(draftRef);
        if (draftSnap.exists()) {
          const data = draftSnap.data();
          if (data && data.formData) { setDraftData(data.formData); setShowDraftModal(true); }
        }
      } catch (e) { console.error('Failed to load draft', e); }
    };
    checkDraft();
  }, [user]);

  const handleSaveDraftClick = () => setShowSaveWarningModal(true);
  const confirmSaveDraft = async () => {
    setShowSaveWarningModal(false);
    if (!user || !db) return;
    setIsSavingDraft(true);
    try {
      const draftRef = doc(db, 'artifacts', appId, 'users', user.uid, 'drafts', 'currentDraft');
      await setDoc(draftRef, { formData, updatedAt: new Date().toISOString() });
      setToastMessage('一時保存しました！');
      setTimeout(() => setToastMessage(''), 3000);
    } catch (e) { setToastMessage('保存失敗'); } finally { setIsSavingDraft(false); }
  };
  const handleRestoreDraft = () => { if (draftData) { setFormData(draftData); setIsFormStarted(true); } setShowDraftModal(false); };
  const handleChange = (field, value) => setFormData(prev => ({ ...prev, [field]: value }));
  const handlePartChange = (field, index, subfield, value) => {
    setFormData(prev => {
      const arr = prev[field].map((item, i) => i === index ? { ...item, [subfield]: value } : item);
      return { ...prev, [field]: arr };
    });
  };

  const handleImageUpload = (e) => {
    const files = Array.from(e.target.files);
    if (!files.length) return;
    files.slice(0, 5 - formData.sec3_images.length).forEach(file => {
      const reader = new FileReader();
      reader.onload = (event) => {
        const img = new Image();
        img.onload = () => {
          const canvas = document.createElement('canvas');
          let w = img.width, h = img.height;
          if (w > h) { if (w > 600) { h *= 600 / w; w = 600; } }
          else { if (h > 600) { w *= 600 / h; h = 600; } }
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          const dataUrl = canvas.toDataURL('image/jpeg', 0.6);
          setFormData(prev => ({ ...prev, sec3_images: [...(prev.sec3_images || []), dataUrl].slice(0, 5) }));
        };
        img.src = event.target.result;
      };
      reader.readAsDataURL(file);
    });
    e.target.value = '';
  };
  const removeImage = (index) => handleChange('sec3_images', formData.sec3_images.filter((_, i) => i !== index));

  const generateVisualPdf = async () => {
    const element = document.getElementById('export-content-wrapper');
    if (!element) return null;
    await document.fonts.ready;
    const exportHeight = Math.max(1414, element.scrollHeight);
    const pngData = await window.htmlToImage.toPng(element, { pixelRatio: 2, backgroundColor: '#ffffff', cacheBust: true });
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'p', unit: 'px', format: [1000, exportHeight] });
    pdf.addImage(pngData, 'PNG', 0, 0, 1000, exportHeight);
    return pdf;
  };

  const generateAiReadablePdf = async () => {
    await document.fonts.ready;
    const { jsPDF } = window.jspdf;
    const pdf = new jsPDF({ orientation: 'p', unit: 'px', format: [1000, 1414] });
    for (let i = 1; i <= 9; i++) {
      const element = document.getElementById(`ai-page-${i}`);
      if (element) {
        const pngData = await window.htmlToImage.toPng(element, { pixelRatio: 1.5, backgroundColor: '#ffffff', width: 1000, height: 1414, cacheBust: true });
        if (i > 1) pdf.addPage([1000, 1414], 'p');
        pdf.addImage(pngData, 'PNG', 0, 0, 1000, 1414);
      }
    }
    return pdf;
  };

  const handleMobilePdfSave = async (file) => {
    const pdfFile = new File([file.blob], file.filename, { type: 'application/pdf' });

    if (navigator.canShare && navigator.canShare({ files: [pdfFile] })) {
      try {
        await navigator.share({
          files: [pdfFile],
          title: file.filename,
        });
        return;
      } catch (e) {
        if (e && e.name === 'AbortError') return;
        console.warn('share canceled or failed', e);
      }
    }

    // Share APIが使えない、または失敗した場合のフォールバック
    const blobUrl = URL.createObjectURL(file.blob);
    const link = document.createElement('a');
    link.href = blobUrl;
    link.download = file.filename;
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    setTimeout(() => URL.revokeObjectURL(blobUrl), 60000);
  };

  const handleLocalSaveClick = async (type) => {
    if (!isLibraryLoaded) return;
    setMobilePdfFiles([]); // 変更
    setIsGenerating(true);
    window.scrollTo(0, 0);
    await new Promise(r => setTimeout(r, 800));
    try {
      const safeUserName = sanitizeFileName(formData.userName || '無名');
      const safeDishName = sanitizeFileName(formData.dishName || '無題');
      const base = `【${safeUserName}】${safeDishName}`;

      const onReady = (file) => {
        setMobilePdfFiles(prev => [...prev, file]); // 変更
      };

      if (type === 'visual' || type === 'both') {
        const pdf = await generateVisualPdf();
        if (pdf) await savePdfWithPicker(pdf, `${base}_3-2料理のゴール設計ワーク.pdf`, onReady);
      }
      if (type === 'ai' || type === 'both') {
        const pdf = await generateAiReadablePdf();
        if (pdf) await savePdfWithPicker(pdf, `${base}_料理のゴール設計シート_AI読み取り用.pdf`, onReady);
      }
    } catch (e) { alert('保存失敗'); } finally { setIsGenerating(false); }
  };

  const handleSubmitToInstructor = async () => {
    if (!isLibraryLoaded) return;
    setIsSubmitting(true); setSubmitError('');
    window.scrollTo(0, 0);
    await new Promise(r => setTimeout(r, 1000));
    try {
      const visualPdf = await generateVisualPdf();
      const aiPdf = await generateAiReadablePdf();
      if (!visualPdf || !aiPdf) throw new Error('PDF失敗');

      const safeUserName = sanitizeFileName(formData.userName || '無名');
      const safeDishName = sanitizeFileName(formData.dishName || '無題');
      const base = `【${safeUserName}】${safeDishName}`;

      const response = await fetch(MAKE_WEBHOOK_URL, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          userName: formData.userName, dishName: formData.dishName,
          submittedAt: new Date().toLocaleString('ja-JP', { timeZone: 'Asia/Tokyo' }),
          pdfBase64: visualPdf.output('datauristring').split(',')[1],
          aiReadablePdfBase64: aiPdf.output('datauristring').split(',')[1],
          fileName: `${base}_3-2料理のゴール設計ワーク.pdf`,
          aiReadableFileName: `${base}_料理のゴール設計シート_AI読み取り用.pdf`,
        }),
      });
      if (!response.ok) throw new Error('送信エラー');
      setSubmitDone(true); setShowConfirmModal(false);
    } catch (e) { setSubmitError('送信失敗'); } finally { setIsSubmitting(false); }
  };

  useEffect(() => {
    const s1 = document.createElement('script'); s1.src = 'https://unpkg.com/html-to-image@1.11.11/dist/html-to-image.js';
    const s2 = document.createElement('script'); s2.src = 'https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js';
    document.body.appendChild(s1); document.body.appendChild(s2);
    s2.onload = () => setIsLibraryLoaded(true);
    return () => { document.body.removeChild(s1); document.body.removeChild(s2); };

          <button onClick={() => { setShowPreview(false); setIsFormStarted(false); setSubmitDone(false); }} className="w-full py-4 rounded-xl font-black text-white bg-[#182349]">フォームに戻る</button>
        </div>
      </div>
    );
  }

  if (showPreview) {
    const busy = isGenerating || isSubmitting;
    return (
      <div className="min-h-screen bg-gray-200 font-sans">

          <div className="fixed inset-0 bg-white/95 z-50 flex flex-col items-center justify-center text-center p-4">
            <RefreshCw className="w-16 h-16 text-[#cb563e] animate-spin mb-4" />

        </div>

        {/* スマホ用PDFリンク表示 */}
        {mobilePdfFiles.length > 0 && (
          <div className="fixed bottom-4 left-4 right-4 z-[80] bg-white rounded-2xl shadow-2xl border border-gray-200 p-4">

            <div className="flex flex-col gap-2">

              <div className="flex flex-col gap-2">
                <button onClick={handleSubmitToInstructor} className="w-full py-3.5 bg-[#cb563e] text-white rounded-xl font-black">提出する</button>
                <button onClick={() => setShowConfirmModal(false)} className="w-full py-3 bg-gray-100 rounded-xl font-bold">キャンセル</button>
              </div>
            </div>
          </div>
        )}
      </div>
    );

  if (!isFormStarted) {
    const canStart = formData.userName.trim() !== '' && formData.dishName.trim() !== '';
    return (
      <div className="min-h-screen flex items-center justify-center p-4 bg-gray-100 font-sans">
        {showDraftModal && (
          <div className="fixed inset-0 bg-black/50 z-[70] flex items-center justify-center p-4 text-center">
            <div className="bg-white rounded-xl p-8 max-sm w-full shadow-2xl">
              <h3 className="text-lg font-black mb-4">保存データがあります</h3>
              <p className="text-sm font-bold text-gray-600 mb-6">前回の続きから再開しますか？</p>
              <div className="flex flex-col gap-3">
                <button onClick={handleRestoreDraft} className="w-full py-3 bg-[#182349] text-white rounded-lg font-black">再開する</button>
                <button onClick={() => setShowDraftModal(false)} className="w-full py-3 bg-gray-100 rounded-lg font-bold">新しく始める</button>
              </div>
            </div>
          </div>
        )}
        <div className="w-full max-w-[500px] bg-white rounded-[32px] shadow-2xl overflow-hidden border border-gray-100 relative">
          <div className="h-3 w-full bg-[#aa4d3d]"></div>
          <div className="px-10 py-12 flex flex-col items-center">
            <div className="w-20 h-20 rounded-full flex items-center justify-center mb-6 bg-[#f8f0ee]">
               <Target size={40} className="text-[#aa4d3d]" />

            <p className="text-sm font-black text-[#182349] mb-8">3-2料理のゴール設計ワーク</p>
            <div className="w-full bg-[#f8f9fa] rounded-2xl p-6 mb-8 border border-gray-100">
              <div className="flex items-center gap-2 mb-3 text-[#182349]">
                <BookOpen size={20} className="shrink-0" />
                <span className="font-black text-[15px]">入力フォームの目的</span>
              </div>
              <p className="text-[14px] font-bold text-gray-600 leading-relaxed ml-7">

              </p>
            </div>
            <p className="text-[12px] font-black text-[#aa4d3d] text-center mb-10 leading-relaxed">
              ※ワークで得た質問は、本フォームではなくSlackでご質問下さい。
            </p>
            <div className="w-full space-y-6 mb-12">

          {/* 4-4 */}
          <div className="pt-8 border-t border-gray-100">
            <div className="flex flex-wrap items-center gap-3 mb-6">
              <h3 className="text-xl font-black text-[#182349]">4-4. 理想の「味のバランス」</h3>
              <Badge className="text-xs">味のコントラスト</Badge>
            </div>
            <div className="grid md:grid-cols-2 gap-6 mb-6">
              <div>
                <Label>Q.主役のパーツの味は単独でバランスをとるか？</Label>
                <SubLabel>例：肉自体にしっかり味を入れる / 肉は薄味にしてソースで完成させる</SubLabel>
                <TextArea value={formData.sec4_4_taste_main_balance} onChange={e => handleChange('sec4_4_taste_main_balance', e.target.value)} rows={2} />
              </div>
              <div>
                <Label>Q.対比となる味を持つパーツはあるか？</Label>
                <SubLabel>例：脂っこさ（油脂）に対するレモン（酸味）など</SubLabel>
                <TextArea value={formData.sec4_4_taste_contrast_parts} onChange={e => handleChange('sec4_4_taste_contrast_parts', e.target.value)} rows={2} />
              </div>
            </div>
            <div>
              <Label>Q.料理を構成する味はそれぞれどれくらいの強さか？バランスを可視化</Label>
              <SubLabel>基本4要素（甘味・油脂・うま味・塩味）と外周の刺激・調整要素を設定</SubLabel>
              <div className="w-full mt-4 bg-gray-50 border border-gray-200 rounded-xl p-2 sm:p-4 overflow-hidden flex justify-center h-[230px] md:h-auto">
                <div className="origin-top scale-[0.58] md:scale-100">
                  <TasteChart formData={formData} handleChange={handleChange} />
                </div>
              </div>
            </div>
          </div>
        </div>

        <Card title="5. 設計したゴールの仮評価とレシピの条件">
          <div className="space-y-6">
            <div>
              <Label>Q.狙った「偏差値・価格・コンセプト」に到達できそうか？</Label>
              <SubLabel>現状の設計で、最初に定義した目標を達成できそうか自己評価しましょう</SubLabel>
              <TextArea value={formData.sec5_evaluation} onChange={e => handleChange('sec5_evaluation', e.target.value)} />
            </div>
            <div>
              <Label>Q.この料理を一文で言うと？</Label>
              <SubLabel>例：ワイン好きのための, 香ばしさと酸味が共存する大人のステーキ定食</SubLabel>
              <TextArea value={formData.sec5_one_sentence} onChange={e => handleChange('sec5_one_sentence', e.target.value)} />
            </div>
            <div className="grid md:grid-cols-2 gap-6">
              <div>
                <Label>Q.食材のこだわりはあるか？</Label>
                <SubLabel>絶対に避けたい食材の条件等もあればご記入ください</SubLabel>
                <TextArea value={formData.sec5_ingredient} onChange={e => handleChange('sec5_ingredient', e.target.value)} />
              </div>
              <div>
                <Label>Q.調理法のこだわりはあるか？</Label>
                <SubLabel>調理器具の制約など, 避けたい条件があればご記入ください</SubLabel>
                <TextArea value={formData.sec5_cooking} onChange={e => handleChange('sec5_cooking', e.target.value)} />
              </div>
            </div>
          </div>
        </Card>
      </main>

      <div className="fixed bottom-0 left-0 w-full px-3 py-2 md:p-6 bg-white/95 md:bg-white/90 backdrop-blur-xl border-t z-50 shadow-[0_-10px_30px_rgba(0,0,0,0.05)]">
        <div className="max-w-5xl mx-auto flex justify-between items-center gap-2 md:gap-4">
          <button 
            onClick={handleSaveDraftClick} 
            disabled={isSavingDraft} 
            className="w-auto px-3 py-2 md:px-8 md:py-4 border-2 border-[#182349] rounded-xl font-black text-[#182349] flex items-center justify-center gap-1 md:gap-2 hover:bg-gray-50 transition-all active:scale-95 text-xs md:text-base"
          >
            <Save size={16} className="md:w-5 md:h-5"/>
            <span>{isSavingDraft ? '中...' : '一時保存'}</span>
          </button>
          <button 
            onClick={() => setShowPreview(true)} 
            className="flex-1 py-2 md:py-4 bg-[#182349] text-white rounded-xl font-black text-sm md:text-xl shadow-xl flex items-center justify-center gap-2 md:gap-3 hover:bg-[#25325d] transition-all active:scale-95"
          >
            <ImageIcon size={18} className="md:w-6 md:h-6"/>
            <span>PDFプレビュー</span>
          </button>
        </div>
      </div>
      {toastMessage && <div className="fixed top-24 left-1/2 -translate-x-1/2 z-[100] bg-green-500 text-white px-6 py-3 rounded-full font-black shadow-2xl animate-bounce">{toastMessage}</div>}
    </div>
  );
};


ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
